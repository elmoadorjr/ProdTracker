<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0A0D10">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ProdTracker — Supervisor</title>
<style>
  :root{
    --ink:#0A0D10; --panel:#12181F; --panel2:#1A2330; --line:#1F2933;
    --paper:#EEF0F2; --muted:#5C6878; --muted2:#3A4554;
    --working:#00C97A; --break:#F5A623; --lunch:#F5652A; --bio:#3D88F5;
    --locker:#9B6EF5; --out:#E84545; --idle:#3A4554; --alert:#FF4D4D;
    --font:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:var(--font); background:var(--ink); color:var(--paper); min-height:100dvh}
  main{max-width:1140px; margin:0 auto; padding:0 20px 40px}

  /* ── Top bar ── */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px; border-bottom:1px solid var(--line);
    max-width:1140px; margin:0 auto;
  }
  .topbar-left{display:flex; align-items:center; gap:12px}
  .topbar h1{font-size:17px; font-weight:800; letter-spacing:.02em}
  .stamp{font-size:11px; color:var(--muted); font-weight:600; letter-spacing:.03em}
  .topbar .dir-link{
    font-size:12px; font-weight:700; color:var(--muted); text-decoration:none;
    padding:5px 12px; border-radius:999px; border:1px solid var(--line);
    transition:color .15s, border-color .15s;
  }
  .topbar .dir-link:hover{color:var(--paper); border-color:var(--muted2)}

  /* ── Heat strip (signature element) ── */
  .heat-strip{
    background:var(--panel); border-bottom:1px solid var(--line);
    padding:10px 20px; display:flex; align-items:center; gap:12px;
    max-width:1140px; margin:0 auto; overflow-x:auto;
  }
  .heat-strip-label{
    font-size:10px; font-weight:800; letter-spacing:.1em; text-transform:uppercase;
    color:var(--muted); white-space:nowrap; flex-shrink:0;
  }
  .heat-dots{display:flex; flex-wrap:wrap; gap:5px; flex:1}
  .heat-dot{
    width:12px; height:12px; border-radius:50%; flex-shrink:0;
    transition:transform .2s; cursor:default;
  }
  .heat-dot:hover{transform:scale(1.5)}
  .heat-dot.WORKING{background:var(--working)}
  .heat-dot.BREAK{background:var(--break)}
  .heat-dot.LUNCH{background:var(--lunch)}
  .heat-dot.BIO{background:var(--bio)}
  .heat-dot.LOCKER{background:var(--locker)}
  .heat-dot.LOGGED_OUT{background:var(--out)}
  .heat-dot.NOT_STARTED{background:var(--idle)}

  /* ── Toolbar ── */
  .toolbar{
    display:flex; gap:8px; flex-wrap:wrap; align-items:center;
    padding:16px 0 0;
  }
  .tabs{
    display:flex; background:var(--panel); border-radius:12px; padding:3px;
    border:1px solid var(--line); flex-wrap:wrap; gap:2px;
  }
  .tabs button{
    font-family:var(--font); font-size:13px; font-weight:700; color:var(--muted);
    background:none; border:none; border-radius:9px; padding:8px 14px; cursor:pointer;
    white-space:nowrap; transition:background .15s, color .15s;
  }
  .tabs button.on{background:var(--panel2); color:var(--paper)}
  input[type=date], input[type=month]{
    font-family:var(--font); background:var(--panel); border:1px solid var(--line);
    color:var(--paper); border-radius:12px; padding:10px 14px; font-size:14px;
  }
  .btn-refresh{
    font-family:var(--font); font-size:13px; font-weight:800; color:var(--paper);
    background:var(--panel2); border:1px solid var(--line); border-radius:12px;
    padding:10px 18px; cursor:pointer; margin-left:auto; transition:opacity .15s;
  }
  .btn-refresh:disabled{opacity:.5}
  .btn-ghost{
    font-family:var(--font); font-size:13px; font-weight:700; color:var(--paper);
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:10px 14px; cursor:pointer; transition:background .15s;
  }
  .btn-ghost:active{background:var(--panel2)}

  /* ── KPI chips ── */
  .chips{
    display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
    gap:10px; margin:18px 0 16px;
  }
  .chip{
    background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:14px 16px;
  }
  .chip b{display:block; font-size:28px; font-weight:800; font-variant-numeric:tabular-nums; line-height:1.1}
  .chip span{font-size:11px; color:var(--muted); font-weight:600; margin-top:3px; display:block}
  .chip.floor{background:linear-gradient(135deg,#071813,#0A1F12); border-color:#1A4A35}
  .chip.floor b{color:var(--working)}
  .chip.alert-chip b{color:var(--alert)}

  /* ── Table ── */
  .tablewrap{
    background:var(--panel); border:1px solid var(--line); border-radius:16px;
    overflow-x:auto;
  }
  table{width:100%; border-collapse:collapse; font-size:13px; min-width:520px}
  thead tr{border-bottom:1px solid var(--line)}
  th{
    text-align:left; font-size:10px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--muted); padding:12px 14px; white-space:nowrap; font-weight:800;
  }
  td{
    padding:11px 14px; border-bottom:1px solid var(--line);
    white-space:nowrap; font-variant-numeric:tabular-nums;
  }
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:rgba(255,255,255,.02)}
  tr.flagged{background:rgba(255,77,77,.04)}
  tr.flagged td:first-child{box-shadow:inset 3px 0 0 var(--alert)}
  .num{text-align:right}

  .pill{display:inline-flex; align-items:center; gap:6px; font-weight:700; font-size:12px}
  .pill-dot{width:8px; height:8px; border-radius:50%; display:inline-block; flex-shrink:0}
  .s-WORKING .pill-dot{background:var(--working)} .s-BREAK .pill-dot{background:var(--break)}
  .s-LUNCH .pill-dot{background:var(--lunch)}     .s-BIO .pill-dot{background:var(--bio)}
  .s-LOCKER .pill-dot{background:var(--locker)}   .s-LOGGED_OUT .pill-dot{background:var(--out)}
  .s-NOT_STARTED .pill-dot{background:var(--idle)}
  .alerts-cell{color:var(--alert); font-size:11px; font-weight:700; white-space:normal; max-width:200px; line-height:1.4}
  .muted{color:var(--muted)}
  .delta-pos{color:var(--working); font-weight:700} .delta-neg{color:var(--alert); font-weight:700}
  .empty{padding:32px; text-align:center; color:var(--muted); font-size:14px}
  .minibar-wrap{min-width:90px}
  .minibar{height:5px; border-radius:99px; background:var(--line); overflow:hidden; margin-top:5px}
  .minibar i{display:block; height:100%; background:var(--working); border-radius:99px}
  .minibar i.low{background:var(--alert)}

  /* ── mini timeline in table ── */
  .tl-cell{min-width:90px; width:110px}
  .tl-mini{height:6px; border-radius:99px; background:var(--line); overflow:hidden; display:flex}
  .tl-seg{height:100%; min-width:0}
  .tl-seg.WORKING{background:var(--working)} .tl-seg.BREAK{background:var(--break)}
  .tl-seg.LUNCH{background:var(--lunch)} .tl-seg.BIO{background:var(--bio)}
  .tl-seg.LOCKER{background:var(--locker)} .tl-seg.GAP{background:var(--line)}
  .tl-time{font-size:10px; color:var(--muted); margin-top:3px; white-space:nowrap}

  /* ── Form card ── */
  .form-card{
    background:var(--panel); border:1px solid var(--line); border-radius:16px;
    padding:20px; max-width:520px; margin-bottom:16px;
  }
  .form-card h3{font-size:15px; font-weight:800; margin-bottom:14px}
  .form-card label{display:block; font-size:11px; color:var(--muted); margin:12px 0 4px; font-weight:800; letter-spacing:.05em; text-transform:uppercase}
  .form-card select, .form-card input[type=text], .form-card input[type=datetime-local]{
    width:100%; font-family:var(--font); font-size:15px;
    background:var(--ink); border:1px solid var(--line);
    color:var(--paper); border-radius:10px; padding:11px;
  }
  .form-card .go{
    margin-top:16px; width:100%; background:var(--working); border:none;
    color:#001A0D; font-weight:800; font-size:15px; border-radius:12px;
    padding:13px; cursor:pointer; font-family:var(--font);
  }
  .form-msg{font-size:13px; font-weight:700; margin-top:10px; min-height:16px}
  .form-msg.ok{color:var(--working)} .form-msg.err{color:var(--alert)}

  /* ── PIN tab ── */
  .pin-note{font-size:12px; color:var(--muted); margin-bottom:14px; line-height:1.6}
  .pin-val{font-size:16px; font-weight:800; letter-spacing:.3em; font-variant-numeric:tabular-nums}
  .pin-val.hidden-pin{filter:blur(5px); cursor:pointer; transition:filter .2s}
  .pin-val.hidden-pin:hover{filter:blur(2px)}
  .pin-val.revealed{filter:none; cursor:default}
  .reveal-all{
    font-family:var(--font); font-size:13px; font-weight:700; color:var(--paper);
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:8px 14px; cursor:pointer; margin-bottom:14px; display:inline-flex; align-items:center; gap:6px;
  }

  /* ── PIN gate ── */
  .gate{
    max-width:360px; margin:16vh auto 0; text-align:center;
    display:flex; flex-direction:column; gap:14px; padding:0 20px;
  }
  .gate h1{font-size:24px; font-weight:800; letter-spacing:-.01em}
  .gate p{font-size:13px; color:var(--muted); line-height:1.5}
  .gate input{
    font-family:var(--font); font-size:26px; text-align:center; letter-spacing:.4em;
    background:var(--panel); border:1.5px solid var(--line); color:var(--paper);
    border-radius:16px; padding:16px; transition:border-color .2s;
  }
  .gate input:focus{outline:none; border-color:var(--working)}
  .gate button{
    font-family:var(--font); font-size:16px; font-weight:800; color:#001A0D;
    background:var(--working); border:none; border-radius:14px; padding:15px; cursor:pointer;
  }
  .gate .err{color:var(--alert); font-weight:700; min-height:18px; font-size:13px}

  /* ── Section heading in content ── */
  .section-note{font-size:12px; color:var(--muted); margin-top:10px; line-height:1.6; padding:0 2px}
  .section-note code{font-family:monospace; font-size:11px; background:var(--panel2); padding:1px 5px; border-radius:4px; color:var(--paper)}

  /* ── Directory tab ── */
  .dir-search{
    margin-bottom:16px;
  }
  .dir-search input{
    width:100%; max-width:400px; font-family:var(--font); font-size:14px;
    background:var(--panel); border:1px solid var(--line); color:var(--paper);
    border-radius:12px; padding:10px 14px; outline:none;
    transition:border-color .2s;
  }
  .dir-search input:focus{border-color:var(--working)}
  .dir-search input::placeholder{color:var(--muted)}
  .dir-section-label{
    font-size:10px; font-weight:800; letter-spacing:.1em; text-transform:uppercase;
    color:var(--muted); padding:4px 0 10px;
  }
  .dir-cards{display:flex; flex-direction:column; gap:8px; margin-bottom:24px}
  .dir-card{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--panel); border:1px solid var(--line); border-radius:16px;
    padding:14px 16px; gap:12px;
  }
  .dir-card .dc-info{flex:1; min-width:0}
  .dir-card .dc-name{font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .dir-card .dc-id{font-size:11px; color:var(--muted); margin-top:2px}
  .dir-card .dc-url{font-size:11px; color:var(--working); margin-top:3px; word-break:break-all}
  .dir-copy{
    font-family:var(--font); font-size:12px; font-weight:700;
    background:var(--panel2); border:1px solid var(--line); border-radius:10px;
    color:var(--muted); padding:6px 12px; cursor:pointer; white-space:nowrap; flex-shrink:0;
    transition:background .15s, color .15s, border-color .15s;
  }
  .dir-copy:hover{background:var(--working); color:#001A0D; border-color:var(--working)}
  .dir-copy.copied{background:var(--working); color:#001A0D; border-color:var(--working)}
  .dir-toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--working); color:#001A0D; font-size:13px; font-weight:700;
    padding:10px 22px; border-radius:999px; opacity:0; pointer-events:none;
    transition:opacity .2s; white-space:nowrap;
  }
  .dir-toast.show{opacity:1}

  /* ── Email agents ── */
  .email-bar{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:14px 16px; margin-bottom:16px;
  }
  .email-bar-label{flex:1; min-width:160px}
  .email-bar-label b{display:block; font-size:14px; font-weight:700}
  .email-bar-label span{font-size:12px; color:var(--muted)}
  .btn-email{
    font-family:var(--font); font-size:13px; font-weight:800;
    background:var(--working); border:none; border-radius:11px;
    color:#001A0D; padding:10px 18px; cursor:pointer; white-space:nowrap;
    transition:opacity .15s;
  }
  .btn-email:disabled{opacity:.45; cursor:default}
  .btn-email-single{
    font-family:var(--font); font-size:12px; font-weight:700;
    background:var(--panel2); border:1px solid var(--line); border-radius:10px;
    color:var(--muted); padding:5px 11px; cursor:pointer; white-space:nowrap; flex-shrink:0;
    transition:background .15s, color .15s, border-color .15s;
  }
  .btn-email-single:hover{background:var(--working); color:#001A0D; border-color:var(--working)}
  .btn-email-single:disabled{opacity:.4; cursor:default}
  .email-result{
    margin-top:12px; font-size:12px; line-height:1.7;
    background:var(--panel2); border-radius:10px; padding:12px 14px;
    display:none;
  }
  .email-result.visible{display:block}
  .email-result .er-sent{color:var(--working)}
  .email-result .er-skip{color:var(--muted)}
  .email-result .er-err{color:var(--alert)}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <h1>ProdTracker</h1>
    <span class="stamp" id="stamp"></span>
  </div>
</div>
<div class="heat-strip" id="heatStrip" style="display:none">
  <span class="heat-strip-label">Team</span>
  <div class="heat-dots" id="heatDots"></div>
</div>
<main id="root"></main>
<div class="dir-toast" id="dirToast">Link copied!</div>

<script>
"use strict";
const CONFIG = {
  API_URL: "https://script.google.com/macros/s/AKfycbwcyEGKlsGLzG_HC8quz8vsTfMwqwJxhJ2ARQadAFl7KvZz8yAYzn-j0t1qhd66mV5g7A/exec",

  // Optional: hard-code agent emails here so you don't need to touch the spreadsheet.
  // Format: { "EMPLOYEE_ID": "email@example.com", ... }
  // If an ID is listed here AND in the Employees sheet col D, this value wins.
  // Leave as {} to use the sheet exclusively.
  AGENT_EMAILS: {
    // "EMP01": "juan@example.com",
    // "EMP02": "maria@example.com",
  }
};

const root = document.getElementById("root");
const _now = new Date();
const _pad = n => String(n).padStart(2,"0");
const _localDate = _now.getFullYear() + "-" + _pad(_now.getMonth()+1) + "-" + _pad(_now.getDate());
const _localMonth = _now.getFullYear() + "-" + _pad(_now.getMonth()+1);
let pin = sessionStorage.getItem("tt_pin") || "";
let tab = "live";

// Refresh date/month pickers when the page becomes visible again after midnight
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState !== "visible") return;
  const n = new Date();
  const today = n.getFullYear()+"-"+_pad(n.getMonth()+1)+"-"+_pad(n.getDate());
  const month = n.getFullYear()+"-"+_pad(n.getMonth()+1);
  if (today !== summaryDate || month !== statsMonth){
    summaryDate = today; statsMonth = month;
    const dp = document.getElementById("datePick");
    const mp = document.getElementById("monthPick");
    if (dp) dp.value = today;
    if (mp) mp.value = month;
  }
});
let summaryDate = _localDate;
let statsMonth = _localMonth;
let lastLive = null, lastSummary = null, lastReconcile = null, lastStats = null;
let employeesCache = null;

const STATE_LABEL = {
  WORKING:"Working", BREAK:"Break", LUNCH:"Lunch", BIO:"Bio Break",
  LOCKER:"Locker Break", LOGGED_OUT:"Logged Out", NOT_STARTED:"Not Started"
};
const STATE_FROM_EVENT = {
  TIME_IN:"WORKING", TIME_OUT:"LOGGED_OUT",
  BREAK_START:"BREAK", BREAK_END:"WORKING",
  LUNCH_START:"LUNCH", LUNCH_END:"WORKING",
  BIO_START:"BIO", BIO_END:"WORKING",
  LOCKER_START:"LOCKER", LOCKER_END:"WORKING"
};
const fmtSince = iso => iso ? new Date(iso).toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}) : "—";
const fmtMin = m => m==null?"":m>=60?Math.floor(m/60)+"h "+(String(m%60).padStart(2,"0"))+"m":m+"m";
let liveTickHandle = null;
let autoRefreshHandle = null;
let _loadInFlight = false;
function startLiveTick(){
  clearInterval(liveTickHandle);
  liveTickHandle = setInterval(()=>{
    document.querySelectorAll("td[data-since]").forEach(cell=>{
      const m = Math.floor((Date.now() - new Date(cell.dataset.since).getTime()) / 60000);
      cell.textContent = fmtMin(m);
    });
  }, 10000);
  clearInterval(autoRefreshHandle);
  autoRefreshHandle = setInterval(load, 30000);
}
const esc = s => String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

async function api(params){
  const qs = new URLSearchParams({...params, pin}).toString();
  const r = await fetch(CONFIG.API_URL + "?" + qs);
  const data = await r.json();
  if (!data.ok && /PIN/i.test(data.error||"")){ sessionStorage.removeItem("tt_pin"); pin=""; renderGate("Wrong PIN — try again."); throw new Error("pin"); }
  if (!data.ok) throw new Error(data.error || "Request failed");
  return data;
}

/* ── Heat strip ── */
function updateHeatStrip(teamArr){
  const strip = document.getElementById("heatStrip");
  const dots = document.getElementById("heatDots");
  if (!teamArr || !teamArr.length){ strip.style.display = "none"; return; }
  strip.style.display = "flex";
  const order = ["WORKING","BREAK","LUNCH","BIO","LOCKER","LOGGED_OUT","NOT_STARTED"];
  const sorted = [...teamArr].sort((a,b) => order.indexOf(a.state) - order.indexOf(b.state));
  dots.innerHTML = sorted.map(e =>
    `<div class="heat-dot ${e.state}" title="${esc(e.name)} — ${STATE_LABEL[e.state]}"></div>`
  ).join("");
}

/* ── Mini timeline ── */
function buildMiniTimeline(shiftStartIso, shiftEndIso, eventsArr){
  if (!shiftStartIso) return "";
  const start = new Date(shiftStartIso).getTime();
  const end = shiftEndIso ? new Date(shiftEndIso).getTime() : Date.now();
  // Scale to full expected shift length so a brand-new shift doesn't show as 100% full
  const shiftMs = (lastLive && lastLive.config && lastLive.config.SHIFT_LENGTH_HOURS
    ? Number(lastLive.config.SHIFT_LENGTH_HOURS) : 9) * 3600000;
  const total = Math.max(shiftMs, end - start);
  const fmtT = iso => new Date(iso).toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
  const segs = [];
  let cursor = start, curState = "WORKING";
  for (const ev of (eventsArr||[])){
    const ts = new Date(ev.ts).getTime();
    if (ts <= start) continue;
    const w = Math.max(0, Math.min(ts, end) - cursor);
    if (w > 0) segs.push({ type: curState, pct: w/total*100 });
    cursor = ts;
    curState = STATE_FROM_EVENT[ev.action] || curState;
  }
  const remaining = Math.max(0, end - cursor);
  if (remaining > 0) segs.push({ type: curState, pct: remaining/total*100 });
  const bars = segs.map(s => `<div class="tl-seg ${s.type}" style="width:${s.pct.toFixed(1)}%"></div>`).join("");
  return `<td class="tl-cell">
    <div class="tl-mini">${bars}</div>
    <div class="tl-time">${fmtT(shiftStartIso)}</div>
  </td>`;
}

/* ── PIN gate ── */
function renderGate(err){
  root.innerHTML = `
    <div class="gate">
      <h1>Supervisor access</h1>
      <p>Enter the supervisor PIN to view your team's dashboard.</p>
      <input id="pinInput" type="password" inputmode="numeric" autocomplete="off" placeholder="••••">
      <div class="err">${err||""}</div>
      <button id="pinGo">Unlock</button>
    </div>`;
  const input = document.getElementById("pinInput");
  const go = async () => {
    pin = input.value.trim();
    if (!pin) return;
    try{ await api({action:"team"}); sessionStorage.setItem("tt_pin",pin); renderShell(); load(); }
    catch(e){
      if (e.message !== "pin"){
        const errEl = root.querySelector(".gate .err");
        if (errEl) errEl.textContent = "Couldn't reach the server — check your connection and the API URL.";
      }
    }
  };
  document.getElementById("pinGo").addEventListener("click", go);
  input.addEventListener("keydown", e=>{ if(e.key==="Enter") go(); });
  input.focus();
}

/* ── Shell ── */
function renderShell(){
  root.innerHTML = `
    <div class="toolbar">
      <div class="tabs">
        <button id="tabLive">Live</button>
        <button id="tabSummary">Daily</button>
        <button id="tabReconcile">Reconcile</button>
        <button id="tabStats">Stats</button>
        <button id="tabFix">Corrections</button>
        <button id="tabPins">PINs</button>
        <button id="tabDirectory">Directory</button>
      </div>
      <input type="date" id="datePick" value="${summaryDate}" style="display:none">
      <input type="month" id="monthPick" value="${statsMonth}" style="display:none">
      <button class="btn-ghost" id="exportBtn" style="display:none">Export CSV</button>
      <button class="btn-refresh" id="refreshBtn">↻ Refresh</button>
    </div>
    <div id="content"><div class="empty">Loading…</div></div>`;

  const T = (id,name)=>document.getElementById(id).addEventListener("click",()=>{ tab=name; load(); });
  T("tabLive","live"); T("tabSummary","summary"); T("tabReconcile","reconcile");
  T("tabStats","stats"); T("tabFix","fix"); T("tabPins","pins"); T("tabDirectory","directory");
  document.getElementById("refreshBtn").addEventListener("click", load);
  document.getElementById("exportBtn").addEventListener("click", exportCSV);
  document.getElementById("datePick").addEventListener("change", e=>{ summaryDate=e.target.value; load(); });
  document.getElementById("monthPick").addEventListener("change", e=>{ statsMonth=e.target.value; load(); });
}

async function load(){
  if (_loadInFlight) return;
  _loadInFlight = true;
  const btn = document.getElementById("refreshBtn");
  ["Live","Summary","Reconcile","Stats","Fix","Pins","Directory"].forEach(n=>{
    const el = document.getElementById("tab"+n);
    if (el) el.className = (tab===n.toLowerCase())?"on":"";
  });
  const usesDate = (tab==="summary"||tab==="reconcile");
  document.getElementById("datePick").style.display = usesDate?"":"none";
  document.getElementById("monthPick").style.display = (tab==="stats")?"":"none";
  document.getElementById("exportBtn").style.display = (tab==="summary"||tab==="stats")?"":"none";
  if (tab !== "live"){ clearInterval(liveTickHandle); clearInterval(autoRefreshHandle); document.getElementById("heatStrip").style.display = "none"; }
  if (btn){ btn.disabled=true; btn.textContent="Loading…"; }
  try{
    if (tab==="live"){ lastLive = await api({action:"team"}); renderLive(lastLive); }
    else if (tab==="summary"){ lastSummary = await api({action:"summary",date:summaryDate}); renderSummary(lastSummary); }
    else if (tab==="reconcile"){ lastReconcile = await api({action:"reconcile",date:summaryDate}); renderReconcile(lastReconcile); }
    else if (tab==="stats"){ lastStats = await api({action:"stats",month:statsMonth}); renderStats(lastStats); }
    else if (tab==="fix"){ await renderFix(); }
    else if (tab==="pins"){ await renderPins(); }
    else if (tab==="directory"){ await renderDirectory(); }
    const stamp = document.getElementById("stamp");
    if (stamp) stamp.textContent = "Updated " + new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
  }catch(e){
    if (e.message!=="pin" && document.getElementById("content"))
      document.getElementById("content").innerHTML = `<div class="empty">Couldn't load: ${esc(e.message)}.</div>`;
  }
  _loadInFlight = false;
  if (document.getElementById("refreshBtn")){ btn.disabled=false; btn.textContent="↻ Refresh"; }
}

/* ── Live ── */
function renderLive(data){
  const t = data.team;
  updateHeatStrip(t);
  const count = s => t.filter(e=>e.state===s).length;
  const loggedIn = t.filter(e=>!["LOGGED_OUT","NOT_STARTED"].includes(e.state)).length;
  const alertCount = t.filter(e=>e.alerts.length).length;

  const chips = `
    <div class="chips">
      <div class="chip floor"><b>${data.floor.onFloor}<span style="font-size:14px;color:rgba(0,201,122,.6)"> / ${loggedIn}</span></b><span>On the floor</span></div>
      <div class="chip"><b>${data.floor.offFloor}</b><span>Off floor</span></div>
      <div class="chip"><b>${count("LUNCH")}</b><span>On lunch</span></div>
      <div class="chip"><b>${t.filter(e=>e.targetMet).length}</b><span>Hit ${data.targetHours}h target</span></div>
      <div class="chip ${alertCount?'alert-chip':''}"><b>${alertCount}</b><span>Alerts</span></div>
    </div>`;

  const fmtProd = e => {
    if (e.productionMs == null) return '<span class="muted">—</span>';
    const m = Math.floor(e.productionMs/60000);
    const txt = Math.floor(m/60) + "h " + String(m%60).padStart(2,"0") + "m";
    return e.targetMet
      ? `<b style="color:var(--working)">${txt} ✓</b>`
      : `<b>${txt}</b> <span class="muted">/ ${data.targetHours}h</span>`;
  };

  const rows = t
    .sort((a,b)=>(b.alerts.length-a.alerts.length)||a.name.localeCompare(b.name))
    .map(e=>{
      const tlCell = e.shiftStart
        ? buildMiniTimeline(e.shiftStart, e.state==="LOGGED_OUT"?e.since:null, e.shiftEvents||[])
        : `<td class="tl-cell muted" style="font-size:11px">—</td>`;
      return `<tr class="${e.alerts.length?'flagged':''}">
        <td><b>${esc(e.name)}</b> <span class="muted" style="font-size:11px">${esc(e.id)}</span></td>
        <td><span class="pill s-${e.state}"><span class="pill-dot"></span>${STATE_LABEL[e.state]}</span></td>
        <td>${fmtSince(e.since)}</td>
        <td class="num muted" ${e.since ? `data-since="${e.since}"` : ""}>${fmtMin(e.minutesInState)}</td>
        <td class="num">${fmtProd(e)}</td>
        ${tlCell}
        <td class="alerts-cell">${e.alerts.map(esc).join(" · ")||""}</td>
      </tr>`;
    }).join("");

  document.getElementById("content").innerHTML = chips + `
    <div class="tablewrap"><table>
      <thead><tr>
        <th>Employee</th><th>Status</th><th>Since</th><th class="num">For</th>
        <th class="num">Production</th><th>Timeline</th><th>Alerts</th>
      </tr></thead>
      <tbody>${rows||`<tr><td colspan="7" class="empty">No employees configured.</td></tr>`}</tbody>
    </table></div>`;
  startLiveTick();
}

/* ── Reconcile ── */
function renderReconcile(data){
  if (!data.hasBiometric){
    document.getElementById("content").innerHTML = `<div class="empty">
      No biometric data for ${esc(data.date)}.<br><br>
      Paste the official biometric export into the <b>Biometric</b> sheet
      (columns: Date · Employee ID · Hours), then refresh.</div>`;
    return;
  }
  const flagged = data.rows.filter(r=>r.flag).length;
  const chips = `<div class="chips">
    <div class="chip"><b>${data.rows.filter(r=>r.bioHours!=null).length}</b><span>Matched on ${esc(data.date)}</span></div>
    <div class="chip ${flagged?'alert-chip':''}"><b>${flagged}</b><span>Mismatches ≥ 30 min</span></div>
  </div>`;
  const rows = data.rows.sort((a,b)=>Math.abs(b.delta||0)-Math.abs(a.delta||0)).map(r=>{
    if (r.bioHours==null) return `<tr>
      <td><b>${esc(r.employeeName)}</b> <span class="muted">${esc(r.employeeId)}</span></td>
      <td class="num">${r.appHours}h</td><td class="num muted">no data</td><td class="num muted">—</td></tr>`;
    const d = r.delta, cls = Math.abs(d)<0.5?"muted":(d>0?"delta-pos":"delta-neg");
    return `<tr class="${r.flag?'flagged':''}">
      <td><b>${esc(r.employeeName)}</b> <span class="muted">${esc(r.employeeId)}</span></td>
      <td class="num">${r.appHours}h</td><td class="num">${r.bioHours}h</td>
      <td class="num ${cls}">${d>0?"+":""}${d}h ${r.flag?'⚠':''}</td></tr>`;
  }).join("");
  document.getElementById("content").innerHTML = chips + `
    <div class="tablewrap"><table>
      <thead><tr><th>Employee</th><th class="num">App production</th><th class="num">Biometric</th><th class="num">Delta</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    <p class="section-note">A positive delta usually means someone isn't tapping when they leave the floor.</p>`;
}

/* ── Monthly stats ── */
function renderStats(data){
  const r = data.rows;
  if (!r.length){ document.getElementById("content").innerHTML = `<div class="empty">No completed shifts in ${esc(data.month)}.</div>`; return; }
  const teamAvg = (r.reduce((s,x)=>s+x.avgProductionHours,0)/r.length).toFixed(2);
  const teamHit = Math.round(r.reduce((s,x)=>s+x.targetHitRate,0)/r.length);
  const chips = `<div class="chips">
    <div class="chip"><b>${r.length}</b><span>Employees · ${esc(data.month)}</span></div>
    <div class="chip"><b>${teamAvg}h</b><span>Team avg production</span></div>
    <div class="chip"><b>${teamHit}%</b><span>Avg ${data.targetHours}h hit rate</span></div>
  </div>`;
  const rows = r.map(e=>{
    const pct = Math.min(100, e.avgProductionHours/data.targetHours*100);
    const hitColor = e.targetHitRate>=80?"var(--working)":e.targetHitRate>=50?"var(--break)":"var(--alert)";
    return `<tr>
      <td><b>${esc(e.employeeName)}</b> <span class="muted" style="font-size:11px">${esc(e.employeeId)}</span></td>
      <td class="num">${e.shifts}</td>
      <td class="minibar-wrap"><b>${e.avgProductionHours}h</b><div class="minibar"><i class="${pct<100?'low':''}" style="width:${pct}%"></i></div></td>
      <td class="num">${e.avgNonProductionHours}h</td>
      <td class="num"><b style="color:${hitColor}">${e.targetHitRate}%</b></td>
      <td class="num muted">${e.totalProductionHours}h</td>
    </tr>`;
  }).join("");
  document.getElementById("content").innerHTML = chips + `
    <div class="tablewrap"><table>
      <thead><tr>
        <th>Employee</th><th class="num">Shifts</th><th>Avg production</th>
        <th class="num">Avg non-prod</th><th class="num">${data.targetHours}h hit rate</th><th class="num">Total prod</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

async function getEmployeesList(){
  if (employeesCache) return employeesCache;
  const r = await fetch(CONFIG.API_URL + "?action=employees").then(x=>x.json());
  let list = r.ok ? r.employees : [];
  // Merge CONFIG.AGENT_EMAILS: overrides the sheet's email for matching IDs,
  // and adds an email for any agent not yet in the sheet's col D.
  const overrides = CONFIG.AGENT_EMAILS || {};
  if (Object.keys(overrides).length){
    list = list.map(e => ({
      ...e,
      email: overrides[e.id] !== undefined ? overrides[e.id] : (e.email || "")
    }));
  }
  employeesCache = list;
  return employeesCache;
}

async function resetPin(empId, btn){
  if (!confirm("Reset PIN for this agent?")) return;
  btn.disabled = true; btn.textContent = "Resetting…";
  try{
    const res = await fetch(CONFIG.API_URL, {
      method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({ action:"resetAgentPin", pin, employeeId: empId })
    }).then(x=>x.json());
    if (!res.ok) throw new Error(res.error || "Reset failed");
    btn.textContent = "✓ Reset";
    const cell = document.getElementById("pin-cell-" + empId);
    if (cell){
      cell.innerHTML = '<span style="color:var(--muted);font-size:12px;font-weight:500;letter-spacing:0">Not set</span>';
      cell.classList.remove("hidden-pin","revealed"); cell.dataset.pin="";
    }
  }catch(e){
    btn.disabled = false; btn.textContent = "Reset";
    alert("Couldn't reset PIN: " + (e.message || e));
  }
}

/* ── CSV export ── */
function downloadCSV(filename, rows){
  const csv = rows.map(r=>r.map(c=>{
    const s = String(c==null?"":c);
    return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;
  }).join(",")).join("\n");
  const blob = new Blob(["\uFEFF" + csv],{type:"text/csv;charset=utf-8"});
  const a = document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=filename; a.click();
  URL.revokeObjectURL(a.href);
}
function exportCSV(){
  if (tab==="summary" && lastSummary){
    const rows = [["Date","Employee ID","Name","Time In","Time Out","Production h","Lunch h","Break h","Bio h","Locker h","Alerts"]];
    lastSummary.rows.forEach(e=>rows.push([lastSummary.date,e.employeeId,e.employeeName,e.timeIn,e.timeOut,e.productionHours,e.lunchHours,e.breakHours,e.bioHours,e.lockerHours,e.alerts.join("; ")]));
    downloadCSV("summary_"+lastSummary.date+".csv",rows);
  } else if (tab==="stats" && lastStats){
    const rows = [["Month","Employee ID","Name","Shifts","Avg production h","Avg non-prod h","Target hit %","Total production h"]];
    lastStats.rows.forEach(e=>rows.push([lastStats.month,e.employeeId,e.employeeName,e.shifts,e.avgProductionHours,e.avgNonProductionHours,e.targetHitRate,e.totalProductionHours]));
    downloadCSV("stats_"+lastStats.month+".csv",rows);
  }
}

  resultEl.className = "email-result"; resultEl.innerHTML = "";
  try {
    const res = await fetch(CONFIG.API_URL, {
      method: "POST", headers: {"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({
        action:"emailAgents", pin, baseUrl, includePin,
        emailOverrides: CONFIG.AGENT_EMAILS || {}
      })
    }).then(x => x.json());
    showEmailResult(resultEl, res);
  } catch(e) {
    resultEl.className = "email-result visible";
    resultEl.innerHTML = `<span class="er-err">Network error — ${esc(String(e.message||e))}</span>`;
  }
  btn.disabled = false; btn.textContent = "Send to all";
}

async function emailSingleAgent(btn){
  const empId = btn.dataset.empid;
  const baseUrl = btn.dataset.baseurl;
  const resultEl = document.getElementById("emailResult");
  const includePin = document.getElementById("includePinChk")?.checked !== false;
  const allBtns = document.querySelectorAll(".btn-email-single");
  allBtns.forEach(b => b.disabled = true);
  btn.textContent = "Sending…";
  resultEl.className = "email-result"; resultEl.innerHTML = "";
  try {
    const res = await fetch(CONFIG.API_URL, {
      method: "POST", headers: {"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({
        action:"emailAgents", pin, baseUrl, includePin, employeeId: empId,
        emailOverrides: CONFIG.AGENT_EMAILS || {}
      })
    }).then(x => x.json());
    showEmailResult(resultEl, res);
    if (res.ok && res.sent && res.sent.length > 0){
      btn.textContent = "✓ Sent";
      setTimeout(() => { btn.textContent = "✉ Send"; }, 3000);
    } else {
      btn.textContent = "✉ Send";
    }
  } catch(e) {
    resultEl.className = "email-result visible";
    resultEl.innerHTML = `<span class="er-err">Network error — ${esc(String(e.message||e))}</span>`;
    btn.textContent = "✉ Send";
  }
  allBtns.forEach(b => b.disabled = false);
}

function showEmailResult(el, res){
  if (!res.ok){ el.className = "email-result visible"; el.innerHTML = `<span class="er-err">Error: ${esc(res.error||"Unknown error")}</span>`; return; }
  const sentLines = (res.sent||[]).map(s => `<span class="er-sent">✓ ${esc(s.name)} → ${esc(s.email)}</span>`).join("<br>");
  const skipLines = (res.skipped||[]).map(s => `<span class="er-skip">— ${esc(s.name)}: ${esc(s.reason)}</span>`).join("<br>");
  const parts = [];
  if (res.sent && res.sent.length) parts.push(`<b>${res.sent.length} sent</b><br>${sentLines}`);
  if (res.skipped && res.skipped.length) parts.push(`<b style="color:var(--muted)">${res.skipped.length} skipped</b><br>${skipLines}`);
  el.className = "email-result visible";
  el.innerHTML = parts.join("<br><br>") || "Nothing to send.";
}

function dirCopyLink(btn){
  const url = btn.dataset.url;
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = "✓ Copied";
    btn.classList.add("copied");
    const toast = document.getElementById("dirToast");
    if (toast){ toast.classList.add("show"); setTimeout(()=>toast.classList.remove("show"),2000); }
    setTimeout(() => { btn.textContent = "Copy link"; btn.classList.remove("copied"); }, 2000);
  }).catch(() => {
    // Fallback for older mobile browsers
    const ta = document.createElement("textarea");
    ta.value = url; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select(); document.execCommand("copy");
    document.body.removeChild(ta);
    btn.textContent = "✓ Copied"; btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copy link"; btn.classList.remove("copied"); }, 2000);
  });
}

/* ── Boot ── */
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
if (CONFIG.API_URL.startsWith("PASTE")){
  root.innerHTML = `<div class="empty"><b>Setup needed:</b> paste your Apps Script URL into CONFIG.API_URL.</div>`;
} else if (pin){ renderShell(); load(); }
else renderGate();
</script>
