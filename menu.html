<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#101418">
<title>ProdTracker — Directory</title>
<style>
  :root{
    --ink:#101418; --paper:#F6F7F8; --muted:#8A939E; --line:#252C33;
    --accent:#1FA463; --radius:18px;
    --font:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;font-family:var(--font);background:var(--ink);color:var(--paper)}
  body{display:flex;flex-direction:column;min-height:100dvh;padding:0 0 40px}

  header{
    padding:20px 20px 10px;
    border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;
  }
  header h1{font-size:18px;font-weight:700;letter-spacing:.02em}
  header span{font-size:12px;color:var(--muted)}

  .pin-wall{
    flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:16px;padding:32px 20px;
  }
  .pin-wall h2{font-size:16px;color:var(--muted);font-weight:500}
  .pin-input{
    display:flex;gap:12px;
  }
  .pin-input input{
    width:52px;height:64px;font-size:28px;font-weight:700;text-align:center;
    background:#1C2329;border:2px solid var(--line);border-radius:14px;
    color:var(--paper);outline:none;caret-color:var(--accent);
    transition:border-color .2s;
  }
  .pin-input input:focus{border-color:var(--accent)}
  .pin-error{color:#C84545;font-size:13px;min-height:18px;text-align:center}
  .pin-hint{font-size:12px;color:var(--muted);text-align:center}

  .directory{display:none;flex-direction:column;gap:0;padding:0 16px;margin-top:8px}
  .directory.visible{display:flex}

  .section-label{
    font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:var(--muted);padding:20px 4px 8px;
  }

  .agent-card{
    display:flex;align-items:center;justify-content:space-between;
    background:#151C23;border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 16px;margin-bottom:8px;gap:12px;
    text-decoration:none;color:inherit;
    transition:background .15s,border-color .15s;
  }
  .agent-card:active{background:#1C2733}
  .agent-card .info{flex:1;min-width:0}
  .agent-card .name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .agent-card .id{font-size:12px;color:var(--muted);margin-top:2px}
  .agent-card .url{font-size:11px;color:var(--accent);margin-top:3px;word-break:break-all}
  .copy-btn{
    background:#1C2329;border:1px solid var(--line);border-radius:10px;
    color:var(--muted);font-size:12px;padding:6px 12px;cursor:pointer;
    white-space:nowrap;flex-shrink:0;transition:background .15s,color .15s;
  }
  .copy-btn:active,.copy-btn.copied{background:var(--accent);color:#fff;border-color:var(--accent)}

  .supervisor-card{
    display:flex;align-items:center;justify-content:space-between;
    background:#0D2C1D;border:1px solid #1A4A35;border-radius:var(--radius);
    padding:16px;margin-bottom:8px;text-decoration:none;color:inherit;
    transition:background .15s;
  }
  .supervisor-card:active{background:#113822}
  .supervisor-card .label{font-weight:700;font-size:15px}
  .supervisor-card .sub{font-size:12px;color:#6DC49A;margin-top:2px}
  .arrow{color:var(--accent);font-size:18px}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:#1FA463;color:#fff;font-size:13px;font-weight:600;
    padding:10px 20px;border-radius:999px;opacity:0;
    transition:opacity .2s;pointer-events:none;white-space:nowrap;
  }
  .toast.show{opacity:1}

  .search-wrap{padding:12px 16px 0}
  .search-wrap input{
    width:100%;background:#1C2329;border:1px solid var(--line);
    border-radius:12px;padding:10px 14px;color:var(--paper);
    font-size:14px;outline:none;
  }
  .search-wrap input::placeholder{color:var(--muted)}
  .search-wrap input:focus{border-color:var(--accent)}
</style>
</head>
<body>

<header>
  <h1>📋 ProdTracker Directory</h1>
  <span id="agentCount"></span>
</header>

<!-- PIN wall -->
<div class="pin-wall" id="pinWall">
  <h2>Enter supervisor PIN to view links</h2>
  <div class="pin-input">
    <input type="password" inputmode="numeric" maxlength="1" id="p0" autofocus>
    <input type="password" inputmode="numeric" maxlength="1" id="p1">
    <input type="password" inputmode="numeric" maxlength="1" id="p2">
    <input type="password" inputmode="numeric" maxlength="1" id="p3">
  </div>
  <div class="pin-error" id="pinError"></div>
  <div class="pin-hint">Same PIN as supervisor dashboard</div>
</div>

<!-- Directory (hidden until PIN OK) -->
<div class="directory" id="directory">
  <div class="search-wrap">
    <input type="search" id="searchBox" placeholder="Search agent…" oninput="filterAgents()">
  </div>
  <div class="section-label">Supervisor</div>
  <a href="supervisor.html" class="supervisor-card">
    <div>
      <div class="label">Supervisor Dashboard</div>
      <div class="sub">supervisor.html</div>
    </div>
    <span class="arrow">›</span>
  </a>
  <div class="section-label" id="agentLabel">Agents</div>
  <div id="agentList"></div>
</div>

<div class="toast" id="toast">Link copied!</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const API_URL = "https://script.google.com/macros/s/AKfycbwcyEGKlsGLzG_HC8quz8vsTfMwqwJxhJ2ARQadAFl7KvZz8yAYzn-j0t1qhd66mV5g7A/exec";
const BASE_URL = "https://elmoadorjr.github.io/ProdTracker/";
// ─────────────────────────────────────────────────────────────────────────────

let allAgents = [];
let pinVerified = false;
let enteredPin = "";

// PIN input logic
const inputs = [0,1,2,3].map(i => document.getElementById("p" + i));
inputs.forEach((inp, i) => {
  inp.addEventListener("input", e => {
    const val = e.target.value.replace(/\D/g,"");
    e.target.value = val;
    if(val && i < 3) inputs[i+1].focus();
    enteredPin = inputs.map(x => x.value).join("");
    if(enteredPin.length === 4) verifyPin(enteredPin);
  });
  inp.addEventListener("keydown", e => {
    if(e.key === "Backspace" && !inp.value && i > 0){
      inputs[i-1].focus();
      inputs[i-1].value = "";
      enteredPin = "";
    }
  });
});

async function verifyPin(pin){
  document.getElementById("pinError").textContent = "";
  try {
    const res = await fetch(API_URL + "?action=summary&pin=" + encodeURIComponent(pin) + "&date=" + today());
    if(!res.ok) throw new Error("network");
    const data = await res.json();
    if(data.error && data.error.toLowerCase().includes("pin")){
      showPinError();
      return;
    }
    // PIN accepted — load employees
    unlockDirectory(pin);
  } catch(e) {
    // Fallback: try employees endpoint
    try {
      const res2 = await fetch(API_URL + "?action=employees");
      const d2 = await res2.json();
      if(d2.employees) { unlockDirectory(pin); return; }
    } catch(_){}
    showPinError();
  }
}

function showPinError(){
  document.getElementById("pinError").textContent = "Incorrect PIN";
  inputs.forEach(i => { i.value=""; });
  inputs[0].focus();
  enteredPin = "";
}

async function unlockDirectory(pin){
  pinVerified = true;
  document.getElementById("pinWall").style.display = "none";
  document.getElementById("directory").classList.add("visible");
  await loadAgents();
}

async function loadAgents(){
  try {
    const res = await fetch(API_URL + "?action=employees");
    const data = await res.json();
    allAgents = (data.employees || []).filter(e => e.active !== false && e.active !== "FALSE");
    renderAgents(allAgents);
    document.getElementById("agentCount").textContent = allAgents.length + " agents";
    document.getElementById("agentLabel").textContent = "Agents (" + allAgents.length + ")";
  } catch(e) {
    document.getElementById("agentList").innerHTML = '<p style="color:var(--muted);padding:16px;font-size:13px;">Could not load employees. Check API connection.</p>';
  }
}

function renderAgents(agents){
  const list = document.getElementById("agentList");
  if(!agents.length){
    list.innerHTML = '<p style="color:var(--muted);padding:16px;font-size:13px;">No agents found.</p>';
    return;
  }
  list.innerHTML = agents.map(a => {
    const url = BASE_URL + "?id=" + encodeURIComponent(a.id);
    return `
      <div class="agent-card">
        <div class="info">
          <div class="name">${esc(a.name)}</div>
          <div class="id">ID: ${esc(a.id)}</div>
          <div class="url">${url}</div>
        </div>
        <button class="copy-btn" onclick="copyLink('${esc(url)}', this)">Copy</button>
      </div>`;
  }).join("");
}

function filterAgents(){
  const q = document.getElementById("searchBox").value.toLowerCase();
  const filtered = allAgents.filter(a =>
    a.name.toLowerCase().includes(q) || a.id.toLowerCase().includes(q)
  );
  renderAgents(filtered);
}

function copyLink(url, btn){
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = "✓ Copied";
    btn.classList.add("copied");
    showToast();
    setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
  });
}

function showToast(){
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

function today(){
  return new Date().toISOString().slice(0,10);
}

function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>
