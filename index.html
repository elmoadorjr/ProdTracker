<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A0D10">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Time Tracker</title>
<style>
  :root{
    --ink:#0A0D10; --surface:#12181F; --surface2:#1A2330; --line:#1F2933;
    --paper:#EEF0F2; --muted:#5C6878; --muted2:#3A4554;
    --working:#00C97A; --break:#F5A623; --lunch:#F5652A;
    --bio:#3D88F5; --locker:#9B6EF5; --out:#E84545; --idle:#3A4554;
    --radius:20px; --radius-sm:14px;
    --font:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:var(--font); background:var(--ink); color:var(--paper);
    display:flex; flex-direction:column; min-height:100dvh;
    transition:background .5s ease;
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

  /* State-tinted backgrounds — subtle, not garish */
  body[data-state="WORKING"]{background:#071813}
  body[data-state="BREAK"]{background:#1A1205}
  body[data-state="LUNCH"]{background:#1A0C05}
  body[data-state="BIO"]{background:#071528}
  body[data-state="LOCKER"]{background:#120B28}
  body[data-state="LOGGED_OUT"]{background:#160A0A}

  /* ── Header ── */
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:max(14px,env(safe-area-inset-top)) 20px 14px;
    position:relative;
  }
  .who{font-weight:700; font-size:14px; letter-spacing:.01em; color:var(--paper)}
  .who small{display:block; font-size:11px; font-weight:500; color:var(--muted); letter-spacing:.04em; margin-top:1px}
  .header-right{display:flex; align-items:center; gap:10px}

  #syncBadge{
    font-size:11px; font-weight:700; padding:5px 10px; border-radius:999px;
    border:1px solid var(--line); color:var(--muted); letter-spacing:.03em;
  }
  #syncBadge::before{content:"●"; margin-right:5px; font-size:7px; vertical-align:1px}
  #syncBadge.offline{border-color:#4A3413; color:#F5A623}
  #syncBadge.syncing{border-color:#13304A; color:#7FB8F0}
  #syncBadge.syncing::before{content:"↻"; font-size:12px; vertical-align:-1px}

  /* ── Main content area ── */
  main{
    flex:1; display:flex; flex-direction:column;
    padding:0 20px max(24px,env(safe-area-inset-bottom));
    max-width:480px; width:100%; margin:0 auto;
  }

  /* ── Arc ring hero ── */
  .ring-hero{
    display:flex; flex-direction:column; align-items:center;
    padding:8px 0 4px; position:relative;
  }
  .ring-wrap{position:relative; width:220px; height:220px; margin:0 auto}
  .ring-wrap svg{width:100%; height:100%; transform:rotate(-225deg)}
  .ring-track{fill:none; stroke:var(--line); stroke-width:10; stroke-linecap:round}
  .ring-fill{
    fill:none; stroke-width:10; stroke-linecap:round;
    stroke-dasharray:502; stroke-dashoffset:502;
    transition:stroke-dashoffset 1s linear, stroke .4s ease;
  }
  .ring-fill.working{stroke:var(--working)}
  .ring-fill.break{stroke:var(--break)}
  .ring-fill.lunch{stroke:var(--lunch)}
  .ring-fill.bio{stroke:var(--bio)}
  .ring-fill.locker{stroke:var(--locker)}
  .ring-fill.out{stroke:var(--out)}
  .ring-fill.met{stroke:#00FF99}

  .ring-inner{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
  }
  .ring-state{
    font-size:10px; font-weight:800; letter-spacing:.16em; text-transform:uppercase;
    color:var(--muted); margin-bottom:4px;
  }
  .ring-state[data-s="WORKING"]{color:var(--working)}
  .ring-state[data-s="BREAK"]{color:var(--break)}
  .ring-state[data-s="LUNCH"]{color:var(--lunch)}
  .ring-state[data-s="BIO"]{color:var(--bio)}
  .ring-state[data-s="LOCKER"]{color:var(--locker)}
  .ring-state[data-s="LOGGED_OUT"]{color:var(--out)}
  .ring-state[data-s="NOT_STARTED"]{color:var(--muted)}
  #elapsed{
    font-size:42px; font-weight:800; line-height:1; letter-spacing:-.02em;
    font-variant-numeric:tabular-nums; color:var(--paper);
  }
  #sinceLine{font-size:12px; color:var(--muted); margin-top:5px; font-weight:500}

  .ring-prod-label{
    font-size:13px; font-weight:700; margin-top:12px;
    color:var(--muted); letter-spacing:.01em;
  }
  .ring-prod-label b{color:var(--paper)}
  .ring-prod-label.met{color:var(--working)}
  .ring-prod-label.risk{color:var(--out)}

  /* ── Timeline strip ── */
  .timeline-wrap{
    margin:16px 0 0;
    background:var(--surface); border:1px solid var(--line);
    border-radius:var(--radius-sm); padding:14px 16px;
  }
  .timeline-label{
    display:flex; justify-content:space-between;
    font-size:10px; font-weight:800; letter-spacing:.1em; text-transform:uppercase;
    color:var(--muted); margin-bottom:9px;
  }
  .timeline-bar{height:12px; border-radius:99px; background:var(--line); overflow:hidden; display:flex}
  .timeline-seg{height:100%; transition:width .4s ease; min-width:0}
  .timeline-seg.WORKING{background:var(--working)}
  .timeline-seg.BREAK{background:var(--break)}
  .timeline-seg.LUNCH{background:var(--lunch)}
  .timeline-seg.BIO{background:var(--bio)}
  .timeline-seg.LOCKER{background:var(--locker)}
  .timeline-seg.GAP{background:var(--line)}
  .timeline-legend{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px}
  .tl-item{display:flex; align-items:center; gap:5px; font-size:11px; color:var(--muted)}
  .tl-dot{width:7px; height:7px; border-radius:50%; flex-shrink:0}
  .tl-dot.WORKING{background:var(--working)} .tl-dot.BREAK{background:var(--break)}
  .tl-dot.LUNCH{background:var(--lunch)} .tl-dot.BIO{background:var(--bio)}
  .tl-dot.LOCKER{background:var(--locker)}

  /* ── Production hint line ── */
  .prod-hint{
    font-size:13px; font-weight:600; color:var(--muted);
    text-align:center; padding:10px 0 4px; line-height:1.4;
  }
  .prod-hint.met{color:var(--working)}
  .prod-hint.risk{color:var(--out)}
  .sched-line{font-size:11px; color:var(--muted2); text-align:center; padding-bottom:4px}

  /* ── Floor line ── */
  .floor-line{
    display:flex; align-items:center; justify-content:center; gap:8px;
    font-size:12px; color:var(--muted); padding:6px 0; font-weight:600;
  }
  .floor-line b{color:var(--paper)}
  .floor-line .dot{width:7px; height:7px; border-radius:50%; background:var(--working); display:inline-block; margin-right:2px}

  /* ── Action buttons ── */
  .actions{display:flex; flex-direction:column; gap:10px; margin-top:auto; padding-top:12px}
  button.action{
    font-family:var(--font); font-size:16px; font-weight:800; letter-spacing:.05em;
    border:none; border-radius:var(--radius); padding:19px; width:100%;
    color:#fff; cursor:pointer;
    transition:transform .08s ease, filter .15s ease, opacity .2s;
    text-transform:uppercase;
  }
  button.action:active{transform:scale(.97); filter:brightness(1.15)}
  button.action:focus-visible{outline:3px solid rgba(255,255,255,.5); outline-offset:3px}
  button.action:disabled{opacity:.35; pointer-events:none}
  .a-TIME_IN{background:var(--working); color:#001A0D}
  .a-TIME_OUT{background:var(--out)}
  .a-BREAK_START{background:var(--break); color:#1A0E00}
  .a-LUNCH_START{background:var(--lunch)}
  .a-BIO_START{background:var(--bio)}
  .a-LOCKER_START{background:var(--locker)}
  .a-RETURN{background:var(--working); color:#001A0D}

  /* 2-up grid for break buttons */
  .secondary-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .secondary-grid button.action{font-size:14px; padding:17px 12px}

  /* ── Nav row ── */
  .nav-row{
    display:flex; justify-content:center; gap:16px; padding-top:14px;
  }
  .link-btn{
    background:none; border:none; color:var(--muted); font-family:var(--font);
    font-size:13px; font-weight:700; cursor:pointer; padding:4px 8px;
    text-decoration:none; border-bottom:1px solid var(--line);
    transition:color .15s, border-color .15s;
  }
  .link-btn:active{color:var(--paper)}

  /* ── PIN gate ── */
  .pin-gate{
    position:fixed; inset:0; background:rgba(6,9,12,.93);
    backdrop-filter:blur(16px);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; padding:28px; z-index:100;
  }
  .pin-gate h2{font-size:22px; font-weight:800; text-align:center; letter-spacing:-.01em}
  .pin-gate p{font-size:13px; color:var(--muted); text-align:center; max-width:260px; line-height:1.5}
  .pin-row{display:flex; gap:12px}
  .pin-row input{
    width:56px; height:68px; font-size:28px; font-weight:800; text-align:center;
    background:var(--surface); border:1.5px solid var(--line); border-radius:16px;
    color:var(--paper); outline:none; caret-color:var(--working);
    transition:border-color .2s;
  }
  .pin-row input:focus{border-color:var(--working)}
  .pin-err{color:var(--out); font-size:13px; min-height:18px; text-align:center; font-weight:700}
  .pin-cancel{
    font-family:var(--font); font-size:14px; font-weight:700; color:var(--muted);
    background:none; border:none; cursor:pointer; padding:8px; text-decoration:underline;
  }

  /* ── Toast ── */
  #toast{
    position:fixed; left:50%; bottom:max(28px, env(safe-area-inset-bottom));
    transform:translate(-50%, 80px); opacity:0;
    background:var(--paper); color:var(--ink); font-weight:800; font-size:14px;
    padding:12px 22px; border-radius:999px; pointer-events:none;
    transition:transform .25s ease, opacity .25s ease; white-space:nowrap;
    box-shadow:0 8px 32px rgba(0,0,0,.5);
  }
  #toast.show{transform:translate(-50%,0); opacity:1}
  #toast.warn{background:#F5A623; color:#1A0E00}

  /* ── End-of-shift recap ── */
  .recap{
    border-radius:var(--radius); padding:28px 22px; text-align:center;
    background:var(--surface); border:1px solid var(--line);
  }
  .recap h2{font-size:16px; font-weight:800; color:var(--muted); letter-spacing:.04em; text-transform:uppercase; margin-bottom:6px}
  .recap .big{
    font-size:clamp(52px,16vw,72px); font-weight:800;
    font-variant-numeric:tabular-nums; letter-spacing:-.02em; margin:8px 0 4px;
    line-height:1;
  }
  .recap .big.met{color:var(--working)} .recap .big.miss{color:var(--out)}
  .recap .verdict{font-size:14px; font-weight:700; margin-bottom:22px; color:var(--muted)}
  .recap-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:8px}
  .recap-grid div{
    background:var(--surface2); border-radius:12px; padding:12px 6px;
  }
  .recap-grid b{display:block; font-size:18px; font-variant-numeric:tabular-nums; font-weight:800; color:var(--paper)}
  .recap-grid span{font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted)}
  .recap .sched-line{margin-top:14px; font-size:12px; color:var(--muted)}

  /* ── Stats view ── */
  .stats-header{display:flex; align-items:center; justify-content:space-between; padding:4px 0 16px}
  .stats-header h2{font-size:18px; font-weight:800}
  .stats-tabs{
    display:flex; background:var(--surface); border-radius:12px; padding:4px;
    margin-bottom:16px; border:1px solid var(--line); gap:2px;
  }
  .stats-tabs button{
    flex:1; font-family:var(--font); font-size:13px; font-weight:700; color:var(--muted);
    background:none; border:none; border-radius:9px; padding:9px 4px; cursor:pointer;
    transition:background .15s, color .15s;
  }
  .stats-tabs button.on{background:var(--surface2); color:var(--paper)}
  .shift-card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-sm);
    padding:14px 16px; margin-bottom:10px;
  }
  .shift-card .sc-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px}
  .shift-card .sc-date{font-weight:700; font-size:14px}
  .shift-card .sc-date small{display:block; font-size:11px; color:var(--muted); font-weight:500; margin-top:2px}
  .shift-card .sc-prod{font-size:22px; font-weight:800; font-variant-numeric:tabular-nums}
  .shift-card .sc-prod.met{color:var(--working)} .shift-card .sc-prod.miss{color:var(--out)}
  .shift-card .sc-bar{height:6px; border-radius:99px; background:var(--line); overflow:hidden; margin:4px 0 10px}
  .shift-card .sc-bar i{display:block; height:100%; border-radius:99px; background:var(--working)}
  .shift-card .sc-bar i.met{background:#00FF99} .shift-card .sc-bar i.miss{background:var(--out)}
  .shift-card .sc-detail{display:flex; flex-wrap:wrap; gap:6px 14px}
  .shift-card .sc-detail span{font-size:11px; color:var(--muted)}
  .shift-card .sc-detail b{color:var(--paper)}
  .shift-tl{margin:10px 0 4px}
  .month-card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-sm);
    padding:16px; margin-bottom:12px;
  }
  .month-card h3{font-size:14px; font-weight:800; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:14px}
  .month-stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px}
  .month-stat-grid .ms{background:var(--surface2); border-radius:10px; padding:12px}
  .month-stat-grid .ms b{display:block; font-size:22px; font-weight:800; font-variant-numeric:tabular-nums}
  .month-stat-grid .ms span{font-size:10px; color:var(--muted); letter-spacing:.06em; text-transform:uppercase}
  .hit-bar{height:6px; border-radius:99px; background:var(--line); overflow:hidden; margin:14px 0 6px}
  .hit-bar i{display:block; height:100%; border-radius:99px}
  .stats-wrap{display:flex; flex-direction:column; gap:0}

  /* ── Identify / dropdown ── */
  .identify{display:flex; flex-direction:column; gap:16px; margin:auto 0; text-align:center}
  .identify h1{font-size:26px; font-weight:800; letter-spacing:-.01em}
  .identify p{color:var(--muted); font-size:14px; line-height:1.5}
  select,.identify button{
    font-family:var(--font); font-size:16px; padding:16px; border-radius:var(--radius-sm);
    border:1px solid var(--line); background:var(--surface); color:var(--paper); width:100%;
  }
  .identify button{background:var(--working); border:none; font-weight:800; cursor:pointer; color:#001A0D}
  .loading,.error-screen{
    margin:auto; text-align:center; color:var(--muted); padding:0 24px; line-height:1.6;
  }
  .error-screen b{color:var(--paper); display:block; margin-bottom:8px}
</style>
</head>
<body data-state="">
  <header>
    <div class="who">
      <span id="whoami">&nbsp;</span>
    </div>
    <div class="header-right">
      <span id="syncBadge">online</span>
    </div>
  </header>
  <main id="app"><div class="loading">Loading…</div></main>
  <div id="toast"></div>

<script>
"use strict";
const CONFIG = {
  API_URL: "https://script.google.com/macros/s/AKfycbwcyEGKlsGLzG_HC8quz8vsTfMwqwJxhJ2ARQadAFl7KvZz8yAYzn-j0t1qhd66mV5g7A/exec"
};

const STATE_FROM_EVENT = {
  TIME_IN:"WORKING", TIME_OUT:"LOGGED_OUT",
  BREAK_START:"BREAK", BREAK_END:"WORKING",
  LUNCH_START:"LUNCH", LUNCH_END:"WORKING",
  BIO_START:"BIO", BIO_END:"WORKING",
  LOCKER_START:"LOCKER", LOCKER_END:"WORKING"
};
const VALID_ACTIONS = {
  NOT_STARTED:["TIME_IN"], LOGGED_OUT:["TIME_IN"],
  WORKING:["BREAK_START","LUNCH_START","BIO_START","LOCKER_START","TIME_OUT"],
  BREAK:["BREAK_END"], LUNCH:["LUNCH_END"], BIO:["BIO_END"], LOCKER:["LOCKER_END"]
};
const LABELS = {
  TIME_IN:"Clock In", TIME_OUT:"End Shift",
  BREAK_START:"Take a Break", LUNCH_START:"Lunch", BIO_START:"Bio Break", LOCKER_START:"Locker Break",
  BREAK_END:"Back to Work", LUNCH_END:"Back to Work", BIO_END:"Back to Work", LOCKER_END:"Back to Work"
};
const STATE_TEXT = {
  NOT_STARTED:"NOT STARTED", WORKING:"WORKING", BREAK:"ON BREAK", LUNCH:"LUNCH",
  BIO:"BIO BREAK", LOCKER:"LOCKER BREAK", LOGGED_OUT:"SHIFT COMPLETE"
};
const STATE_COLOR = {
  WORKING:"var(--working)", BREAK:"var(--break)", LUNCH:"var(--lunch)",
  BIO:"var(--bio)", LOCKER:"var(--locker)", LOGGED_OUT:"var(--out)"
};
const RING_CLASS = {
  WORKING:"working", BREAK:"break", LUNCH:"lunch",
  BIO:"bio", LOCKER:"locker", LOGGED_OUT:"out"
};

const app = document.getElementById("app");
let employee = null;
let state = "NOT_STARTED";
let since = null;
let timerHandle = null;
let shiftStart = null, prodBaseMs = 0, prodAnchor = null;
let targets = { minProductionHours: 7, shiftLengthHours: 9 };
let schedule = [];
let floor = null;
let lastRecap = null;
let view = "main";
let statsTab = "weekly";
let weekData = null;
let nudged = { midpoint:false };
let shiftEvents = [];
let pinSetOnServer = false;

/* Full local snapshot of the live shift, so an offline reload mid-shift
   restores the ring, production count and timeline — not just the state. */
const snapKey = id => "tt_snap_" + id;
function saveSnapshot(){
  if (!employee) return;
  localStorage.setItem(snapKey(employee.id), JSON.stringify({
    state, since: since ? since.toISOString() : null,
    shiftStart: shiftStart ? shiftStart.toISOString() : null,
    prodBaseMs, prodAnchor: prodAnchor ? prodAnchor.toISOString() : null,
    shiftEvents, nudged, targets, pinSetOnServer
  }));
}
function restoreSnapshot(id){
  const s = JSON.parse(localStorage.getItem(snapKey(id)) || "null");
  if (!s) return false;
  state = s.state; since = s.since ? new Date(s.since) : null;
  shiftStart = s.shiftStart ? new Date(s.shiftStart) : null;
  prodBaseMs = s.prodBaseMs || 0;
  prodAnchor = s.prodAnchor ? new Date(s.prodAnchor) : null;
  shiftEvents = s.shiftEvents || [];
  nudged = s.nudged || { midpoint:false };
  if (s.targets) targets = s.targets;
  pinSetOnServer = !!s.pinSetOnServer;
  return true;
}
const liveProdMs = () => prodBaseMs + (prodAnchor ? Date.now() - prodAnchor.getTime() : 0);
const fmtHM = ms => {
  const m = Math.max(0, Math.round(ms/60000));
  return Math.floor(m/60) + ":" + pad(m%60);
};

const $ = s => document.querySelector(s);
const uuid = () => (crypto.randomUUID ? crypto.randomUUID()
  : "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==="x"?r:(r&3|8)).toString(16);}));
const fmtClock = d => d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
const pad = n => String(n).padStart(2,"0");
const esc = s => String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function toast(msg, warn){
  const t = $("#toast");
  t.textContent = msg; t.className = warn ? "warn show" : "show";
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove("show"), 2200);
}
function vibrate(){ if(navigator.vibrate) navigator.vibrate(40); }

/* ─── Offline queue ── */
const QKEY = "tt_queue_v1";
const getQueue = () => JSON.parse(localStorage.getItem(QKEY)||"[]");
const setQueue = q => localStorage.setItem(QKEY, JSON.stringify(q));
let flushing = false;

function updateSyncBadge(){
  const b = $("#syncBadge");
  if (!b) return;
  const pending = getQueue().length;
  if (!navigator.onLine){ b.textContent = "offline · " + pending + " queued"; b.className = "offline"; }
  else if (pending > 0){ b.textContent = "syncing " + pending + "…"; b.className = "syncing"; }
  else { b.textContent = "online"; b.className = ""; }
}

async function postEvent(ev){
  const res = await fetch(CONFIG.API_URL, {
    method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"},
    body: JSON.stringify({ action:"logEvent", ...ev })
  });
  return res.json();
}

async function flushQueue(){
  if (flushing || !navigator.onLine) return;
  flushing = true;
  let q = getQueue();
  while (q.length){
    try{
      const r = await postEvent(q[0]);
      if (r.ok){ q.shift(); }
      else if (r.permanent || /not allowed|Unknown employee|Invalid event|PIN/i.test(r.error||"")){
        // The server will never accept this event — drop it and tell the user.
        q.shift();
        toast("1 tap couldn't sync: " + (r.error || "rejected"), true);
      }
      else break; // transient server error — retry later
      setQueue(q);
    }catch(_){ break; } // network error — retry later
  }
  flushing = false;
  updateSyncBadge();
}
window.addEventListener("online", ()=>{ flushQueue(); updateSyncBadge(); });
window.addEventListener("offline", updateSyncBadge);
setInterval(flushQueue, 30000);

/* ─── Ring arc updater ── */
// Arc covers 270° (3/4 of circle). circumference of r=80 = 502.65
const ARC_TOTAL = 502;
function updateRing(){
  const fill = $("#ringFill");
  if (!fill || !shiftStart) return;
  const targetMs = targets.minProductionHours * 3600000;
  const prod = liveProdMs();
  const pct = Math.min(1, prod / targetMs);
  const offset = ARC_TOTAL - (pct * ARC_TOTAL);
  fill.style.strokeDashoffset = offset;
  const met = prod >= targetMs;
  fill.className = "ring-fill " + (met ? "met" : (RING_CLASS[state] || "working"));

  const prodEl = $("#prodNow");
  if (!prodEl) return;
  prodEl.textContent = fmtHM(prod);

  const schedEnd = shiftStart.getTime() + targets.shiftLengthHours * 3600000;
  const budget = (schedEnd - Date.now()) - (targetMs - prod);
  const hint = $("#prodHint");
  if (!hint) return;
  if (met){
    hint.className = "prod-hint met";
    hint.textContent = "✓ " + targets.minProductionHours + "h target met";
  } else if (budget <= 0){
    hint.className = "prod-hint risk";
    const doneAt = new Date(Date.now() + (targetMs - prod));
    hint.textContent = "Stay until " + fmtClock(doneAt) + " to hit " + targets.minProductionHours + "h";
  } else {
    hint.className = "prod-hint" + (budget < 15*60000 ? " risk" : "");
    hint.textContent = fmtHM(budget) + " break budget · done by " + fmtClock(new Date(schedEnd));
  }
  const elapsed = Date.now() - shiftStart.getTime();
  const halfShift = targets.shiftLengthHours * 3600000 / 2;
  if (!nudged.midpoint && elapsed > halfShift && state === "WORKING" && budget < 0){
    nudged.midpoint = true;
    toast("Heads up: at this pace you'll miss " + targets.minProductionHours + "h", true);
    vibrate();
  }
}

/* ─── Timeline ── */
function buildTimelineSegs(evts, currentState, shiftStartTime, now){
  if (!shiftStartTime) return [];
  const start = new Date(shiftStartTime).getTime();
  const end = now;
  const total = Math.max(1, end - start);
  const segments = [];
  let cursor = start;
  let curState = "WORKING";
  const push = (type, from, to) => {
    const w = Math.max(0, Math.min(to,end) - Math.max(from,start));
    if (w > 0) segments.push({ type, pct: w/total*100 });
  };
  for (const ev of evts){
    const ts = new Date(ev.ts).getTime();
    if (ts <= start) continue;
    push(curState, cursor, ts);
    cursor = ts;
    curState = STATE_FROM_EVENT[ev.action] || curState;
  }
  push(curState, cursor, end);
  return segments;
}

function timelineHtml(segments, legendItems){
  if (!segments.length) return "";
  const bars = segments.map(s =>
    `<div class="timeline-seg ${s.type}" style="width:${s.pct.toFixed(2)}%"></div>`
  ).join("");
  const legend = (legendItems||[]).map(({type,label}) =>
    `<span class="tl-item"><span class="tl-dot ${type}"></span>${esc(label)}</span>`
  ).join("");
  return `
    <div class="timeline-wrap">
      <div class="timeline-label"><span>Shift timeline</span><span id="tlNow">${fmtClock(new Date())}</span></div>
      <div class="timeline-bar" id="timelineBar">${bars}</div>
      ${legend ? `<div class="timeline-legend">${legend}</div>` : ""}
    </div>`;
}

function updateTimeline(){
  const bar = $("#timelineBar");
  const nowEl = $("#tlNow");
  if (!bar || !shiftStart) return;
  const segs = buildTimelineSegs(shiftEvents, state, shiftStart, new Date());
  bar.innerHTML = segs.map(s =>
    `<div class="timeline-seg ${s.type}" style="width:${s.pct.toFixed(2)}%"></div>`
  ).join("");
  if (nowEl) nowEl.textContent = fmtClock(new Date());
}

/* ─── PIN gate ── */
const getLocalPin = id => localStorage.getItem("tt_apin_" + id) || null;
const setLocalPin = (id, p) => localStorage.setItem("tt_apin_" + id, p);
const clearLocalPin = id => localStorage.removeItem("tt_apin_" + id);

/**
 * opts.mode: "set" (create + confirm) | "enter" (collect 4 digits)
 * opts.verify: optional locally-cached pin — if given, mismatches are rejected
 *              inline (the server still re-verifies on submit)
 * opts.error:  optional error message to show on open
 * opts.onPin(pin), opts.onCancel()
 */
function openPinGate(opts){
  const { mode, verify, error, onPin, onCancel } = opts;
  const isNew = mode === "set";
  const existing = document.getElementById("pinGateEl");
  if (existing) existing.remove();
  const div = document.createElement("div");
  div.className = "pin-gate"; div.id = "pinGateEl";
  div.innerHTML = `
    <h2>${isNew ? "Set your PIN" : "Verify your identity"}</h2>
    <p>${isNew
      ? "Choose a 4-digit PIN. You'll use this every time you clock in — on any device."
      : "Enter your 4-digit PIN to clock in."}</p>
    <div class="pin-row" id="pinRowInputs">
      <input type="password" inputmode="numeric" maxlength="1" id="pg0" autofocus>
      <input type="password" inputmode="numeric" maxlength="1" id="pg1">
      <input type="password" inputmode="numeric" maxlength="1" id="pg2">
      <input type="password" inputmode="numeric" maxlength="1" id="pg3">
    </div>
    ${isNew ? `<div id="pg-confirm-label" style="font-size:13px;color:var(--muted);text-align:center;display:none">Confirm your PIN</div>
    <div class="pin-row" id="pinConfirmRow" style="display:none">
      <input type="password" inputmode="numeric" maxlength="1" id="pc0">
      <input type="password" inputmode="numeric" maxlength="1" id="pc1">
      <input type="password" inputmode="numeric" maxlength="1" id="pc2">
      <input type="password" inputmode="numeric" maxlength="1" id="pc3">
    </div>` : ""}
    <div class="pin-err" id="pgErr">${esc(error || "")}</div>
    <button class="pin-cancel" id="pgCancel">Cancel</button>`;
  document.body.appendChild(div);

  const inputs = [0,1,2,3].map(i => document.getElementById("pg" + i));
  const confirms = isNew ? [0,1,2,3].map(i => document.getElementById("pc" + i)) : [];

  const wireInputs = (arr, onFull) => {
    arr.forEach((inp, i) => {
      inp.addEventListener("input", e => {
        const v = e.target.value.replace(/\D/g,"");
        e.target.value = v;
        if (v && i < arr.length - 1) arr[i+1].focus();
        if (arr.map(x => x.value).join("").length === 4) onFull(arr.map(x => x.value).join(""));
      });
      inp.addEventListener("keydown", e => {
        if (e.key === "Backspace" && !inp.value && i > 0){ arr[i-1].focus(); arr[i-1].value = ""; }
      });
    });
  };

  const setErr = msg => { document.getElementById("pgErr").textContent = msg; };

  if (!isNew){
    wireInputs(inputs, pin => {
      if (verify && pin !== verify){
        setErr("Incorrect PIN. Try again.");
        inputs.forEach(i => { i.value=""; }); inputs[0].focus();
        return;
      }
      div.remove(); onPin(pin);
    });
  } else {
    let firstPin = null;
    wireInputs(inputs, pin => {
      firstPin = pin;
      document.getElementById("pg-confirm-label").style.display = "";
      document.getElementById("pinConfirmRow").style.display = "flex";
      confirms[0].focus();
    });
    wireInputs(confirms, pin => {
      if (pin === firstPin){ div.remove(); onPin(pin); }
      else {
        setErr("PINs don't match. Try again.");
        confirms.forEach(i => { i.value=""; }); inputs.forEach(i => { i.value=""; });
        firstPin = null;
        document.getElementById("pinConfirmRow").style.display = "none";
        document.getElementById("pg-confirm-label").style.display = "none";
        inputs[0].focus();
      }
    });
  }
  document.getElementById("pgCancel").addEventListener("click", () => { div.remove(); if (onCancel) onCancel(); });
}

/* Register a freshly chosen PIN with the server (so it works on every device
   and shows up on the supervisor's PINs tab). */
async function registerPin(pinValue){
  const res = await fetch(CONFIG.API_URL, {
    method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"},
    body: JSON.stringify({ action:"setAgentPin", employeeId: employee.id, pin: pinValue })
  });
  const r = await res.json();
  if (!r.ok) throw new Error(r.error || "Couldn't save PIN");
  return true;
}

/* ─── Actions ── */
async function doAction(eventType, gateError){
  if (eventType !== "TIME_IN"){ performAction(eventType); return; }

  const cached = getLocalPin(employee.id);
  if (cached){
    // Known device: quick local check, server re-verifies on submit.
    openPinGate({ mode:"enter", verify: cached, error: gateError,
                  onPin: p => performAction("TIME_IN", p) });
  } else if (pinSetOnServer){
    // New device, PIN exists on the server — collect it; the server is the judge.
    if (!navigator.onLine){
      toast("Connect to the internet once to verify your PIN on this phone", true);
      return;
    }
    openPinGate({ mode:"enter", error: gateError,
                  onPin: p => performAction("TIME_IN", p) });
  } else {
    // No PIN anywhere yet — first-time setup (registered server-side).
    if (!navigator.onLine){ performAction("TIME_IN", null); return; }
    openPinGate({ mode:"set", error: gateError, onPin: async p => {
      try{
        await registerPin(p);
        setLocalPin(employee.id, p);
        pinSetOnServer = true;
        performAction("TIME_IN", p);
      }catch(err){
        toast(String(err.message || "Couldn't save PIN"), true);
      }
    }});
  }
}

async function performAction(eventType, agentPin){
  const ev = {
    eventId: uuid(), employeeId: employee.id,
    eventType, clientTimestamp: new Date().toISOString()
  };
  if (eventType === "TIME_IN" && agentPin) ev.agentPin = agentPin;

  const tapTime = new Date();
  if (prodAnchor){ prodBaseMs += tapTime.getTime() - prodAnchor.getTime(); prodAnchor = null; }
  if (eventType === "TIME_IN"){ shiftStart = tapTime; prodBaseMs = 0; nudged = { midpoint:false }; lastRecap = null; shiftEvents = []; }
  if (STATE_FROM_EVENT[eventType] === "WORKING") prodAnchor = tapTime;
  if (eventType === "TIME_OUT") prodAnchor = null;
  if (eventType !== "TIME_IN") shiftEvents.push({ ts: tapTime.toISOString(), action: eventType });
  state = STATE_FROM_EVENT[eventType];
  since = tapTime;
  saveSnapshot();
  render(); vibrate();

  let queued = false;
  if (navigator.onLine){
    try{
      const r = await postEvent(ev);
      if (!r.ok && r.pinError){
        // Server rejected the PIN — roll back the optimistic clock-in.
        clearLocalPin(employee.id);
        await resolveEmployee(employee.id);
        doAction("TIME_IN", "Incorrect PIN. Try again.");
        return;
      }
      if (!r.ok && r.state){ state = r.state; since = null; saveSnapshot(); render(); toast("Out of sync — status refreshed", true); return; }
      if (r.ok && eventType === "TIME_IN" && agentPin) setLocalPin(employee.id, agentPin);
    }catch(_){ queued = true; }
  } else queued = true;

  if (queued){ setQueue([...getQueue(), ev]); toast("✓ Saved offline · will sync"); }
  else toast("✓ " + fmtClock(new Date()));
  updateSyncBadge();

  if (eventType === "TIME_OUT" && navigator.onLine){
    try{
      const w = await fetchJSON(CONFIG.API_URL + "?action=week&id=" + encodeURIComponent(employee.id));
      if (w.ok && w.days && w.days[0]){ weekData = w; lastRecap = w.days[0]; render(); }
    }catch(_){}
  }
  if (eventType !== "TIME_IN") refreshFloor();
}

/* ─── Floor ── */
async function refreshFloor(){
  try{
    const r = await fetchJSON(CONFIG.API_URL + "?action=floor");
    if (r.ok){ floor = r; const el = $("#floorLine"); if (el) el.innerHTML = floorHtml(); }
  }catch(_){}
}
function floorHtml(){
  if (!floor) return "";
  return `<span class="dot"></span><b>${floor.onFloor}</b> on the floor · <b>${floor.offFloor}</b> off`;
}

/* ─── Timer ── */
function startTimer(){
  clearInterval(timerHandle);
  const tick = () => {
    const el = $("#elapsed"), line = $("#sinceLine");
    if (!since){ if(el) el.textContent = "--:--:--"; if(line) line.textContent = ""; }
    else {
      const s = Math.max(0, Math.floor((Date.now() - since.getTime())/1000));
      if(el) el.textContent = pad(Math.floor(s/3600)) + ":" + pad(Math.floor(s/60)%60) + ":" + pad(s%60);
      if(line) line.textContent = "since " + fmtClock(since);
    }
    updateRing();
    updateTimeline();
  };
  tick();
  timerHandle = setInterval(tick, 1000);
}

  }

    app.innerHTML = `
      <div class="ring-hero">
        <div class="ring-wrap">
          <svg viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
            <circle class="ring-track" cx="110" cy="110" r="80" stroke-dasharray="502" stroke-dashoffset="0" pathLength="502"/>
            <circle id="ringFill" class="ring-fill out" cx="110" cy="110" r="80"/>
          </svg>
          <div class="ring-inner">

            <div id="elapsed">--:--:--</div>
            <div id="sinceLine"></div>

  const TLLABELS = { BREAK:"Break", LUNCH:"Lunch", BIO:"Bio", LOCKER:"Locker" };
  const legendItems = [{ type:"WORKING", label:"Working" }, ...usedTypes.map(t => ({ type:t, label:TLLABELS[t]||t }))];

  const showRing = shiftStart && state !== "NOT_STARTED";
  const ringClass = RING_CLASS[state] || "working";

function bindButtons(){
  app.querySelectorAll("button.action").forEach(b =>
    b.addEventListener("click", () => doAction(b.dataset.ev)));

  if (sb) sb.addEventListener("click", () => { view = "stats"; openStats(); });

/* ─── Stats ── */
async function openStats(){
  app.innerHTML = `<div class="loading">Loading…</div>`;
  try{
    const w = await fetchJSON(CONFIG.API_URL + "?action=week&id=" + encodeURIComponent(employee.id));
    if (w.ok) weekData = w;
  }catch(_){}
  renderStats();
}

function renderStats(){
  clearInterval(timerHandle);
  const days = (weekData && weekData.days) || [];
  const targetH = (weekData && weekData.targetHours) || targets.minProductionHours;
  const tabs = `
    <div class="stats-header">
      <h2>My Stats</h2>
      <button class="link-btn" id="backBtn">← Back</button>
    </div>
    <div class="stats-tabs">
      <button class="${statsTab==="daily"?"on":""}" data-tab="daily">Today</button>
      <button class="${statsTab==="weekly"?"on":""}" data-tab="weekly">This week</button>
      <button class="${statsTab==="monthly"?"on":""}" data-tab="monthly">Monthly</button>
    </div>`;

  let content = "";
  if (statsTab === "daily"){
    const now = new Date();
    const localToday = now.getFullYear() + "-" + pad(now.getMonth()+1) + "-" + pad(now.getDate());
    const todayClosed = days.filter(d => d.date === localToday && !d.open);
    const live = shiftStart && state !== "LOGGED_OUT";
    if (live){
      const liveProd = liveProdMs();
      const livePct = Math.min(100, liveProd / (targetH * 3600000) * 100);
      content = `
        <div class="shift-card" style="border-color:rgba(0,201,122,.3)">
          <div class="sc-top">
            <div class="sc-date">Live shift<small>${fmtClock(shiftStart)} → now</small></div>
            <div class="sc-prod ${liveProd >= targetH*3600000 ? 'met' : ''}">${fmtHM(liveProd)}</div>
          </div>
          <div class="sc-bar"><i class="${livePct >= 100 ? 'met' : ''}" style="width:${livePct.toFixed(1)}%"></i></div>
          <div class="timeline-bar shift-tl" style="height:10px">${
            buildTimelineSegs(shiftEvents, state, shiftStart, new Date())
              .map(s => `<div class="timeline-seg ${s.type}" style="width:${s.pct.toFixed(2)}%"></div>`).join("")
          }</div>
          <div class="sc-detail">
            <span>Target: <b>${targetH}h</b></span>
            <span>Status: <b style="color:${STATE_COLOR[state]||'inherit'}">${state}</b></span>
          </div>
        </div>`;
      if (todayClosed.length){
        content += `<div style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:8px">Earlier shifts today:</div>`
                 + todayClosed.map(d => shiftCardHtml(d, targetH, false)).join("");
      }
    } else if (todayClosed.length){
      content = shiftCardHtml(todayClosed[0], targetH, true)
              + todayClosed.slice(1).map(d => shiftCardHtml(d, targetH, false)).join("");
    } else {
      content = `<div style="text-align:center;color:var(--muted);padding:32px 0;font-size:14px">No shift recorded yet today.</div>`;
    }
  } else if (statsTab === "weekly"){
    if (!days.length){
      content = `<div style="text-align:center;color:var(--muted);padding:32px 0;font-size:14px">No shifts in the last 7 days.</div>`;
    } else {
      content = days.map(d => shiftCardHtml(d, targetH, false)).join("");
    }
  } else if (statsTab === "monthly"){
    content = monthlyStatsHtml(days, targetH);
  }

  app.innerHTML = tabs + `<div class="stats-wrap">${content}</div>`;
  app.querySelectorAll(".stats-tabs button").forEach(b => {
    b.addEventListener("click", () => { statsTab = b.dataset.tab; renderStats(); });
  });
  const back = $("#backBtn");
  if (back) back.addEventListener("click", () => { view = "main"; render(); });
}

function shiftCardHtml(d, targetH, isToday){
  const met = !d.open && d.productionHours >= targetH;
  const miss = !d.open && !met;
  const pct = Math.min(100, d.productionHours / targetH * 100);
  const dt = d.date ? new Date(d.date + "T00:00:00") : new Date();
  const dayLabel = isToday ? "Today" : dt.toLocaleDateString([], {weekday:"short", month:"short", day:"numeric"});
  return `
    <div class="shift-card">
      <div class="sc-top">
        <div class="sc-date">${dayLabel}<small>${d.timeIn}→${d.timeOut}${d.open?' (open)':''}</small></div>
        <div class="sc-prod ${met?'met':(miss?'miss':'')}">${fmtHrs(d.productionHours)}${met?' ✓':''}</div>
      </div>
      <div class="sc-bar"><i class="${met?'met':(miss?'miss':'')}" style="width:${pct.toFixed(1)}%"></i></div>
      <div class="sc-detail">
        <span>Break: <b>${fmtHrs(d.breakHours)}</b></span>
        <span>Lunch: <b>${fmtHrs(d.lunchHours)}</b></span>
        <span>Bio: <b>${fmtHrs(d.bioHours)}</b></span>
        <span>On shift: <b>${fmtHrs(d.loggedHours)}</b></span>
      </div>
    </div>`;
}

function monthlyStatsHtml(days, targetH){
  if (!days.length) return `<div style="text-align:center;color:var(--muted);padding:32px 0;font-size:14px">No shifts recorded yet.</div>`;
  const completed = days.filter(d => !d.open);
  const metCount = completed.filter(d => d.productionHours >= targetH).length;
  const hitRate = completed.length ? Math.round(metCount/completed.length*100) : 0;
  const avgProd = completed.length ? completed.reduce((s,d)=>s+d.productionHours,0)/completed.length : 0;
  const totalProd = days.reduce((s,d)=>s+d.productionHours,0);
  const avgBreak = completed.length ? completed.reduce((s,d)=>s+d.breakHours+d.lunchHours+d.bioHours,0)/completed.length : 0;
  const hitColor = hitRate >= 80 ? "var(--working)" : hitRate >= 50 ? "var(--break)" : "var(--out)";
  return `
    <div class="month-card">
      <h3>Last ${days.length} shifts</h3>
      <div class="month-stat-grid">
        <div class="ms"><b>${days.length}</b><span>Shifts</span></div>
        <div class="ms"><b style="color:${hitColor}">${hitRate}%</b><span>${targetH}h hit rate</span></div>
        <div class="ms"><b>${fmtHrs(avgProd)}</b><span>Avg production</span></div>
        <div class="ms"><b>${fmtHrs(totalProd)}</b><span>Total production</span></div>
      </div>
      <div class="hit-bar"><i style="width:${hitRate}%;background:${hitColor}"></i></div>
      <div style="font-size:12px;color:var(--muted)">${metCount} of ${completed.length} shifts hit ${targetH}h · avg non-prod: ${fmtHrs(avgBreak)}/shift</div>
    </div>
    ${days.map(d => shiftCardHtml(d, targetH, false)).join("")}`;
}

/* ─── Identification ── */
async function fetchJSON(url){
  const r = await fetch(url);
  return r.json();
}

async function identify(){
  const urlId = new URLSearchParams(location.search).get("id");
  if (urlId) return resolveEmployee(urlId.trim());

  let list = JSON.parse(localStorage.getItem("tt_employees") || "null");
  try{
    const r = await fetchJSON(CONFIG.API_URL + "?action=employees");
    if (r.ok){ list = r.employees; localStorage.setItem("tt_employees", JSON.stringify(list)); }
  }catch(_){}

  if (!list || !list.length){
    app.innerHTML = `<div class="error-screen"><b>Can't load the employee list.</b>Check your connection and reload, or open your personal link (…?id=YOUR_ID).</div>`;
    return;
  }
  app.innerHTML = `
    <div class="identify">
      <h1>Who's clocking in?</h1>
      <p>Use your personal link to skip this step.</p>
      <select id="empSelect">
        ${list.map(e=>`<option value="${e.id}">${e.name} (${e.id})</option>`).join("")}
      </select>
      <button id="goBtn">Continue</button>
    </div>`;
  $("#goBtn").addEventListener("click", ()=>{
    const id = $("#empSelect").value;
    history.replaceState(null,"","?id=" + encodeURIComponent(id));
    resolveEmployee(id);
  });
}

async function resolveEmployee(id){
  const cachedList = JSON.parse(localStorage.getItem("tt_employees")||"[]");
  const cachedEmp = cachedList.find(e=>e.id===id);
  if (cachedEmp){
    employee = cachedEmp;
    restoreSnapshot(id);   // full shift snapshot — ring/production survive an offline reload
    render();
  }
  try{
    const r = await fetchJSON(CONFIG.API_URL + "?action=status&id=" + encodeURIComponent(id));
    if (!r.ok){
      app.innerHTML = `<div class="error-screen"><b>${esc(r.error)}</b>Ask your supervisor to check your employee ID.</div>`;
      return;
    }
    employee = r.employee;
    targets = r.targets || targets;
    schedule = r.schedule || [];
    pinSetOnServer = !!r.pinSet;
    if (getQueue().filter(q=>q.employeeId===id).length === 0){
      // No unsynced taps — the server's view is authoritative.
      state = r.state;
      since = r.since ? new Date(r.since) : null;
      if (r.shift){
        shiftStart = new Date(r.shift.shiftStart);
        prodBaseMs = r.shift.productionMs;
        prodAnchor = (state === "WORKING") ? new Date(r.generatedAt) : null;
      } else {
        shiftStart = null; prodBaseMs = 0; prodAnchor = null;
      }
      shiftEvents = r.shiftEvents || [];
      saveSnapshot();
    }
    render();
  }catch(_){
    if (!employee){
      app.innerHTML = `<div class="error-screen"><b>You're offline and have no saved profile yet.</b>Connect to the internet once to set up this device.</div>`;
    }
  }
  updateSyncBadge();
}

const fmtHrs = h => Math.floor(h) + ":" + pad(Math.round((h - Math.floor(h)) * 60));
function btn(eventType, extraClass){
  return `<button class="action a-${eventType} ${extraClass||""}" data-ev="${eventType}">${LABELS[eventType]}</button>`;
}

/* ─── Boot ── */
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
if (CONFIG.API_URL.startsWith("PASTE")){
  app.innerHTML = `<div class="error-screen"><b>Setup needed:</b>Paste your Apps Script URL into CONFIG.API_URL in index.html.</div>`;
} else {
  updateSyncBadge();
  flushQueue();
  identify();
}
</script>
